<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Query Params</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <header>
    <div class="header-content">
      <div>hi</div>
      <div>Jason</div>
    </div>
  </header>
  <img class="art-piece" src="images/black_lives_matter.png" alt="black_lives_matter"/>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    const data = fetch('JasonTzimas.github.io/data.json')
      .then(data => {
        console.log(data);
      });
    if (name) {
      document.getElementById("title").textContent = `Hello, ${name}!`;
    } else {
      document.getElementById("title").textContent = "Hello, world!";
    }
  </script>

</body>
</html>
