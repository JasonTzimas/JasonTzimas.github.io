<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Query Params</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div>
      <h1 id="title"></h1>
    </div>
  </header>
  <main>
    <div
      class="main-content"
    >
      <img id="art-piece" src="" alt=""/>
      <div
        class="art-info"
      >
        <div
          style="display: flex; flex-direction: column; gap: 1rem;"
        >
          <h3 id="info"></h3>
          <h3 id="number"></h3>
        </div>
        <h3 id="serial-no"></h3>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const uuid = params.get("uuid");

    fetch("https://JasonTzimas.github.io/data.json")
      .then(res => res.json())
      .then(data => {
        console.log("data: ", data);
        if (uuid){
          console.log("uuid: ", uuid);
          console.log("art data: ", data[uuid]);
          const artData = data[uuid];
          document.getElementById("title").textContent = artData.title;
          document.getElementById("art-piece").src = `https://JasonTzimas.github.io/${artData.image_path}`;
          document.getElementById("art-piece").src = `https://JasonTzimas.github.io/${artData.image_path}`;
          document.getElementById("info").textContent = artData.info;
          document.getElementById("number").textContent = `Art Piece:  #${artData.no}/${artData.total}`;
          document.getElementById("serial-no").textContent = `Serial Number: ${uuid}`;
        }
        
    });
  </script>

</body>
</html>
