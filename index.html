<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Query Params</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <header>
    <div class="header-content">
      <h1 id="title"></h1>
    </div>
  </header>
  <img id="art-piece" src="" alt=""/>

  <script>
    const params = new URLSearchParams(window.location.search);
    const uuid = params.get("uuid");

    fetch("https://JasonTzimas.github.io/data.json")
      .then(res => res.json())
      .then(data => {
        if (uuid){
          const data = data[uuid];
          document.getElementById("title").textContent = data.title;
          document.getElementById("art-piece").src = `https://JasonTzimas.github.io/${data.image_path}`;
        }
        
    });
  </script>

</body>
</html>
