<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Query Params</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <header>
    <div class="header-content">
      <h1 id="title"></h1>
    </div>
  </header>
  <img id="art-piece" src="images/black_lives_matter.png" alt="black_lives_matter"/>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    fetch("https://JasonTzimas.github.io/data.json")
      .then(res => res.json())
      .then(data => {
        document.getElementById("title").textContent = data.title;
        document.getElementByClass("art-piece").src = `https://JasonTzimas.github.io/${data.image_path}`;
    });
    if (name) {
      document.getElementById("title").textContent = `Hello, ${name}!`;
    } else {
      document.getElementById("title").textContent = "Hello, world!";
    }
  </script>

</body>
</html>
